name: Sync events

on:
  schedule:
    - cron: '0 5 * * *'  # 07:00 CEST (05:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Scrape events
        run: node scripts/scrape.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/events.json
          git diff --staged --quiet || git commit -m "🔄 chore: sync events $(date -u '+%Y-%m-%d')"
          git push
